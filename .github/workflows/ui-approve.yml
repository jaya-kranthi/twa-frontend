name: UI Approval Gate

on:
  # Manual trigger — customer/PM formally approves the UI
  workflow_dispatch:
    inputs:
      approver_email:
        description: "Approver email address (recorded in .ui-locked)"
        required: true
        type: string
      pages_url:
        description: "GitHub Pages URL to reference in the lock record"
        required: false
        default: "https://jaya-kranthi.github.io/twa-frontend/"
        type: string

  # PR trigger — builds a preview artifact on every PR to main
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

  # Issue comment trigger — /minfy-approve in a PR comment
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── PR preview (runs on every PR) ──────────────────────────────────────────
  pr-preview:
    name: Build PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-preview-pr-${{ github.event.pull_request.number }}
          path: dist
          retention-days: 7

      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## UI Preview Ready\n\nDownload the ui-preview-pr-${{ github.event.pull_request.number }} artifact to review.\n\nOnce approved, trigger the **UI Approval Gate** workflow manually with your email to lock the UI.'
            })

  # ── Approval lock — PR-based to respect branch protection ──────────────────
  approve-and-lock:
    name: Approve UI
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/minfy-approve'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve approver
        id: approver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "email=${{ inputs.approver_email }}" >> $GITHUB_OUTPUT
            echo "pages_url=${{ inputs.pages_url }}" >> $GITHUB_OUTPUT
          else
            echo "email=${{ github.event.comment.user.login }}@github" >> $GITHUB_OUTPUT
            echo "pages_url=https://jaya-kranthi.github.io/twa-frontend/" >> $GITHUB_OUTPUT
          fi

      - name: Create lock branch and commit .ui-locked
        id: lock
        run: |
          BRANCH="ui-approve/$(date -u +%Y-%m-%d-%H%M%S)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          mkdir -p docs
          cat > docs/.ui-locked <<EOF
          {
            "locked_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "approver": "${{ steps.approver.outputs.email }}",
            "actor": "${{ github.actor }}",
            "pages_url": "${{ steps.approver.outputs.pages_url }}",
            "mode": "ci",
            "commit": "${{ github.sha }}"
          }
          EOF
          git add docs/.ui-locked
          git commit -m "chore: lock UI — approved by ${{ steps.approver.outputs.email }}"
          git push origin "$BRANCH"

      - name: Open PR, merge immediately, trigger tech-spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "chore: lock UI — approved by ${{ steps.approver.outputs.email }}" \
            --body "UI formally approved by **${{ steps.approver.outputs.email }}**. Merging lock file — no CI required for a docs-only change." \
            --base main \
            --head "${{ steps.lock.outputs.branch }}")
          echo "PR: $PR_URL"
          # --admin bypasses required status checks — docs/.ui-locked needs no CI
          gh pr merge "$PR_URL" --admin --squash

          # Notify team — engineer runs tech-spec next; sign-off auto-triggers tickets
          gh issue create \
            --title "UI locked — run /minfy:minfy-tech-spec-writer to continue" \
            --body "UI approved by ${{ steps.approver.outputs.email }}. docs/.ui-locked committed to main. Next: run /minfy:minfy-tech-spec-writer in the project root." \
            --label "minfy-next-step" 2>/dev/null || true
