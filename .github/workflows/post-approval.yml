name: Post UI Approval — Tech Spec + Tickets

on:
  workflow_dispatch:
    inputs:
      approver:
        description: "Who approved the UI (passed from ui-approve)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tech-spec-and-tickets:
    name: Generate tech spec + tickets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate docs via Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          prompt: |
            The UI for this project has been formally approved — docs/.ui-locked exists.
            Your job is to generate two documents without asking for approval or confirmation.

            ## Step 1 — docs/architecture.md (Technical Architecture)

            Read docs/spec.md (product spec) and minfy.json (project config). Then write docs/architecture.md covering:
            - System overview: component diagram (ASCII), user flows
            - AWS infrastructure: services used (Cognito, API GW, Lambda/ECS, RDS/DynamoDB, S3, CloudFront), regions, networking (VPC, subnets)
            - Data models: key entities, relationships, primary keys
            - API contract overview: REST endpoints, auth (Bearer JWT), error shapes
            - Security model: Cognito JWT validation, RBAC, data encryption at rest + in transit
            - Non-functional requirements: SLA targets, scalability approach, observability (metrics, logs, traces)

            ## Step 2 — docs/ticket-generator.yaml (Engineering Backlog)

            Read the spec and the architecture you just wrote. Write docs/ticket-generator.yaml in this shape:

            ```yaml
            epics:
              - id: EP-001
                title: "<epic name>"
                stories:
                  - id: ST-001
                    title: "<story title>"
                    kind: frontend | backend | ai
                    size: S | M | L | XL
                    acceptance_criteria:
                      - "Given ... When ... Then ..."
                  - ...
            tasks:
              - id: TK-001
                title: "<task title>"
                kind: nfr | security | telemetry
                size: S | M
            ```

            Rules:
            - One epic per top-level Features section in the spec
            - XL stories must be split into L or smaller
            - Every story needs at least one Given/When/Then criterion
            - Security tasks must cite the OWASP ASVS level

            Do not ask for sign-off. Generate both files and stop.

      - name: Open PR with generated docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="post-approval/$(date -u +%Y-%m-%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/architecture.md docs/ticket-generator.yaml 2>/dev/null || true
          git diff --staged --quiet && echo "No docs generated" && exit 0
          git commit -m "docs: auto-generate tech spec and tickets post UI approval"
          git push origin "$BRANCH"
          BODY="Auto-generated after UI approval by ${{ inputs.approver || 'CI' }}. Review docs/architecture.md and docs/ticket-generator.yaml, then merge to sign off."
          gh pr create \
            --title "docs: tech spec + tickets post UI approval" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
