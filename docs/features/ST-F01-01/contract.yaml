openapi: "3.1.0"
info:
  title: "ST-F01-01 contract subset"
  version: "1.0.0"
paths:
  /api/v1/auth/login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Auth success or MFA required
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      access_token: { type: string }
                      refresh_token: { type: string }
                  - type: object
                    properties:
                      mfa_required: { type: boolean }
                      session: { type: string }
        "401":
          $ref: "../../docs/api-contract.openapi.yaml#/components/responses/Unauthorized"
