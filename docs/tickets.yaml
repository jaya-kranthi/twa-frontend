# STACK: INFRA  (repo: twa-infra · Terraform)
# No unit tests — validated by terraform plan + manual review
# ═══════════════════════════════════════════════════════════════════════════════

infra_stories:

  - id: ST-INFRA-001
    title: "Cognito user pool + app client Terraform"
    stack: infra
    size: M
    sprint: 1
    requires_tests: false
    region: ap-southeast-1
    depends_on: []
    acceptance_criteria:
      - "Given terraform apply, When complete, Then Cognito user pool exists with: email alias, password policy, TOTP MFA optional, custom attribute custom:role"
      - "Given app client created, When configured, Then auth flows: USER_PASSWORD_AUTH + REFRESH_TOKEN enabled; client secret absent (SPA)"
    validation: terraform plan must show 0 errors and no unintended replacements

  - id: ST-INFRA-002
    title: "API Gateway HTTP API + JWT authoriser Terraform"
    stack: infra
    size: M
    sprint: 1
    requires_tests: false
    region: ap-southeast-1
    depends_on: [ST-INFRA-001]
    acceptance_criteria:
      - "Given terraform apply, When complete, Then HTTP API exists with: /api/v1/* routes, JWT authoriser pointing to Cognito user pool issuer + app client audience"
      - "Given unauthenticated request to /api/v1/datasets, When sent, Then 401 from API GW (before reaching backend)"
    validation: terraform plan; manual curl test post-apply

  - id: ST-INFRA-003
    title: "RDS PostgreSQL Multi-AZ Terraform"
    stack: infra
    size: M
    sprint: 1
    requires_tests: false
    region: ap-southeast-1
    depends_on: [ST-INFRA-006]
    acceptance_criteria:
      - "Given terraform apply, When complete, Then RDS instance in private subnets, Multi-AZ enabled, encrypted at rest (AES-256), PostgreSQL 16"
      - "Given RDS created, When connection attempted from private subnet only, Then succeeds; public internet blocked"
    validation: terraform plan; RDS connectivity test from ECS task

  - id: ST-INFRA-004
