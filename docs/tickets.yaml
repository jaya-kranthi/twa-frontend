# ─── AI INTEGRATION ───────────────────────────────────────────────────────────
ai_stories:
  - id: ST-AI-01
    title: "AI: Catalog semantic search — natural language query → ranked results"
    kind: ai
    size: L
    sprint: 7
    depends_on: [ST-F03-01, SP-004]
    prompt_path: "src/modules/catalog/ai/semantic-search.prompt.ts"
    response_schema: "src/types/ai/SemanticSearchResult.ts"
    guardrails:
      - "No user PII sent to AI — only dataset metadata chunks"
      - "AI results shown alongside standard results (additive, not replacement)"
      - "Suppress AI results if top relevance score < 0.4"
    acceptance_criteria:
      - "Given user types a natural language query, When AI results arrive, Then a 'Suggested by AI' section appears above standard results with relevance badges"
      - "Given AI top score < 0.4, When results render, Then no AI section is shown"
      - "Given AI service is unavailable, When query fires, Then standard search results still render (graceful degradation)"
    msw_handlers:
      - "POST /api/v1/datasets/search/semantic → { results: [{ dataset_id, score }] }"

  - id: TK-test-AI-01
    title: "Tests: Catalog semantic search"
    kind: frontend-test
    size: S
    sprint: 7
    depends_on: [ST-AI-01]
    test_plan:
      unit:
        - "AI section renders only when score >= 0.4"
        - "Graceful degradation: AI fetch fails → standard results shown"
      integration:
        - "MSW returns high-score results → AI section visible"
        - "MSW returns low-score results → AI section hidden"
      a11y:
        - "AI section has aria-label 'AI-suggested datasets'"

  - id: ST-AI-02
    title: "AI: Similar datasets recommendation on dataset detail"
    kind: ai
    size: M
    sprint: 7
    depends_on: [ST-F04-01, SP-004]
    prompt_path: "src/modules/dataset/ai/similar-datasets.prompt.ts"
    response_schema: "src/types/ai/SimilarDatasetResult.ts"
    acceptance_criteria:
      - "Given dataset detail loads, When AI recommendations arrive, Then 3-5 similar dataset cards are shown in a 'You might also like' section"
      - "Given AI service fails, When detail renders, Then section is simply hidden (no error UI)"

  - id: TK-test-AI-02
    title: "Tests: Similar datasets recommendations"
    kind: frontend-test
    size: S
    sprint: 7
    depends_on: [ST-AI-02]
    test_plan:
      unit:
        - "Section renders with 3-5 cards"
        - "Section hidden on AI failure"
      integration:
        - "MSW returns 3 recommendations → 3 cards shown"

  - id: ST-AI-03
    title: "AI: Dashboard personalised 'new datasets you might want' digest"
    kind: ai
    size: M
    sprint: 7
    depends_on: [ST-F02-01, SP-004]
    prompt_path: "src/modules/dashboard/ai/digest.prompt.ts"
    acceptance_criteria:
      - "Given user visits /dashboard, When AI digest loads, Then up to 3 highlight tiles appear for new datasets matching download history + org entitlements"
      - "Given no matching new datasets, When digest resolves, Then section is hidden"

  - id: TK-test-AI-03
    title: "Tests: Dashboard AI digest"
    kind: frontend-test
    size: XS
    sprint: 7
    depends_on: [ST-AI-03]
    test_plan:
      unit:
        - "Digest section shows max 3 tiles"
        - "Hidden when no matches"
      a11y:
        - "Digest tiles have aria-label"

  - id: ST-AI-04
    title: "AI: Admin anomaly detection — API error spike / usage drop alert"
    kind: ai
    size: M
    sprint: 7
    depends_on: [ST-F09-04, SP-004]
    prompt_path: "src/modules/admin/ai/anomaly-alert.prompt.ts"
    acceptance_criteria:
      - "Given admin views /admin health tiles, When AI detects anomaly in error rate or usage, Then an alert card appears with description + investigation link"
      - "Given no anomaly, When health tiles load, Then alert card is absent"

  - id: TK-test-AI-04
    title: "Tests: Admin anomaly alert"
    kind: frontend-test
    size: XS
    sprint: 7
    depends_on: [ST-AI-04]
    test_plan:
      unit:
        - "Alert card shown on anomaly, hidden on normal"
      integration:
        - "MSW returns anomaly → card visible"

# ─── NON-FUNCTIONAL TASKS ─────────────────────────────────────────────────────
nfr_tasks:
  - id: TK-NFR-01
    title: "NFR: Dashboard p95 load time < 2s — verify with Lighthouse + RUM"
    size: S
    sprint: 5
    depends_on: [ST-F02-01]
    nfr_thresholds:
      dashboard_p95_ms: 2000
    acceptance_criteria:
      - "Given dashboard is deployed, When Lighthouse CI runs, Then Performance score >= 90"
      - "Given CloudWatch RUM is configured, When p95 is measured over 1 week, Then < 2000ms"

  - id: TK-NFR-02
    title: "NFR: Catalog search response < 500ms p99 — add skeleton + measure"
    size: S
    sprint: 4
    depends_on: [ST-F03-01]
    nfr_thresholds:
      catalog_search_p99_ms: 500
    acceptance_criteria:
      - "Given search fires, When response observed in devtools, Then p99 < 500ms (measured across 50 simulated queries)"

  - id: TK-NFR-03
    title: "NFR: CloudWatch RUM integration — frontend p95 latency + error rate"
    size: S
    sprint: 6
    depends_on: [ST-F01-04]
    acceptance_criteria:
      - "Given RUM script is injected in index.html, When users navigate, Then page load events appear in CloudWatch RUM console"

  - id: TK-NFR-04
    title: "NFR: 10 GB download support — verify presigned S3 URL flow in browser"
    size: S
    sprint: 4
    depends_on: [ST-F04-03]
    acceptance_criteria:
      - "Given a 10 GB presigned URL is returned, When user clicks download link, Then browser initiates direct S3 download without proxying through API"

  - id: TK-NFR-05
    title: "NFR: Skeleton loaders on all data-fetching pages"
    size: S
    sprint: 3
    depends_on: [ST-F02-01, ST-F03-01]
    acceptance_criteria:
      - "Given any page with async data, When data is loading, Then skeleton cards/rows match the final layout dimensions"

# ─── SECURITY TASKS ───────────────────────────────────────────────────────────
security_tasks:
  - id: TK-SEC-01
    title: "Security: RBAC route guards — redirect non-authorised roles"
    size: M
    sprint: 2
    depends_on: [ST-F01-04]
    owasp_refs: ["ASVS 4.1.1", "ASVS 4.1.3"]
    acceptance_criteria:
      - "Given SUBSCRIBER visits /admin, When route resolves, Then redirect to /dashboard with 403 toast"
      - "Given SUBSCRIBER visits /org, When route resolves, Then redirect to /dashboard"
      - "Given role is read from Cognito JWT custom:role claim, When guard evaluates, Then role is never read from client-side state alone"

  - id: TK-SEC-02
    title: "Security: Input validation — Yup schemas on all forms"
    size: S
    sprint: 2
    depends_on: [ST-F01-01]
    owasp_refs: ["ASVS 5.1.3"]
    acceptance_criteria:
      - "Given any form in the app, When submitted with invalid data, Then Yup validation fires before any API call"
      - "Given XSS payload in text fields, When submitted, Then payload is rejected by Yup string validation"

  - id: TK-SEC-03
    title: "Security: No sensitive data in URL params (tokens, keys)"
    size: S
    sprint: 2
    depends_on: [ST-F01-04]
    owasp_refs: ["ASVS 3.5.2"]
    acceptance_criteria:
      - "Given auth tokens or API keys, When navigating, Then they never appear in the browser URL bar"
      - "Given download job ID, When poll URL constructed, Then only job_id (non-sensitive) is in the path"

  - id: TK-SEC-04
    title: "Security: Content-Security-Policy header validation"
    size: S
    sprint: 6
    depends_on: [ST-F01-04]
    owasp_refs: ["ASVS 14.4.3"]
    acceptance_criteria:
      - "Given the app is deployed, When CSP header is inspected in browser devtools, Then it includes default-src, script-src, and connect-src directives"

# ─── TELEMETRY TASKS ──────────────────────────────────────────────────────────
telemetry_tasks:
  - id: TK-TEL-01
    title: "Telemetry: Download funnel — time-to-first-download KPI (target < 5 min)"
    size: S
    sprint: 5
    depends_on: [ST-F04-03]
    events:
      - "download_requested { dataset_id, user_id, timestamp }"
      - "download_completed { dataset_id, user_id, duration_ms }"
    acceptance_criteria:
      - "Given user completes download, When events fire, Then duration_ms from request to completion is logged to CloudWatch"
      - "Given KPI dashboard shows p50 time-to-download, When measured over 1 week, Then < 5 min"

  - id: TK-TEL-02
    title: "Telemetry: Catalog search click-through rate (target > 40%)"
    size: S
    sprint: 4
    depends_on: [ST-F03-02]
    events:
      - "catalog_search { query, filters, result_count }"
      - "dataset_card_clicked { dataset_id, position, from_search: true }"
    acceptance_criteria:
      - "Given user searches and clicks a result, When events fire, Then both search + click events are logged"
      - "Given KPI dashboard, When CTR is computed, Then (clicks / searches) over 7d is measurable"

  - id: TK-TEL-03
    title: "Telemetry: API adoption rate — Pro subscribers who create an API key"
    size: S
    sprint: 5
    depends_on: [ST-F06-01]
    events:
      - "api_key_created { user_id, org_id, plan }"
    acceptance_criteria:
      - "Given Pro user creates first API key, When event fires, Then api_key_created is logged with plan=PROFESSIONAL"
      - "Given adoption rate dashboard, When measured at 30 days post-signup, Then > 30% of Pro subscribers have api_key_created"

