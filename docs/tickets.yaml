          - "Given key is created, When modal closes, Then raw key shown ONCE in a copy-to-clipboard widget, then dismissed"
          - "Given user clicks Revoke, When confirmed, Then DELETE /api-keys/:id called and key removed from list"
        msw_handlers:
          - "GET /api/v1/api-keys → ApiKey[]"
          - "POST /api/v1/api-keys → { id, raw_key }"
          - "DELETE /api/v1/api-keys/:id → 204"
        components:
