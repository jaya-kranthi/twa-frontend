# ═══════════════════════════════════════════════════════════════════════════════
# STACK: BACKEND  (repo: twa-backend)
# All backend stories require tests: unit + integration + contract
# ═══════════════════════════════════════════════════════════════════════════════

backend_stories:

  # ── Auth Service ─────────────────────────────────────────────────────────────
  - id: ST-BE-F01-01
    title: "Auth service — Cognito proxy: login, refresh, MFA verify"
    stack: backend
    epic: EP-F01
    size: M
    sprint: 1
    requires_tests: true
    depends_on: []
    acceptance_criteria:
      - "Given POST /api/v1/auth/login with valid email+password, When Cognito responds, Then access_token and refresh_token returned (or mfa_required flag)"
      - "Given POST /api/v1/auth/refresh with valid refresh_token, When Cognito responds, Then new access_token returned"
      - "Given POST /api/v1/auth/mfa/verify with valid session+totp_code, When Cognito responds, Then access_token returned"
      - "Given invalid credentials, When login attempted, Then 401 returned with error code INVALID_CREDENTIALS"
    test_plan:
      unit:
        - "Cognito proxy correctly maps request/response shapes"
        - "Invalid token format rejected before Cognito call"
      integration:
        - "Login flow end-to-end with real Cognito user pool (test environment)"
        - "Refresh token rotation works"
      contract:
        - "Response shape matches OpenAPI contract: access_token, refresh_token fields"

  # ── Dataset Catalog Service ───────────────────────────────────────────────────
  - id: ST-BE-F03-01
    title: "Dataset catalog API — list/search with full-text + filter"
    stack: backend
    epic: EP-F03
    size: L
    sprint: 2
    requires_tests: true
    depends_on: [ST-DB-001, ST-DB-002]
    acceptance_criteria:
      - "Given GET /api/v1/datasets?q=monsoon, When executed, Then PostgreSQL GIN full-text search returns matching datasets ranked by relevance"
      - "Given GET /api/v1/datasets?region=SEA&type=NETCDF, When executed, Then results filtered by both params"
      - "Given GET /api/v1/datasets?page=2&limit=20, When executed, Then correct page returned with total count in response"
      - "Given dataset with status=DRAFT, When listed, Then excluded from public catalog (ACTIVE only)"
    test_plan:
      unit:
        - "Query builder produces correct SQL for each filter combination"
        - "Pagination offset/limit calculated correctly"
      integration:
        - "Full-text search: 'monsoon' returns datasets with monsoon in name/description/tags"
        - "Filter: region=SEA returns only SEA datasets"
        - "Empty search: all ACTIVE datasets returned"
      contract:
        - "Response shape: { data: Dataset[], total: number, page: number, limit: number }"

  - id: ST-BE-F03-02
    title: "Dataset detail API — GET /datasets/:id"
    stack: backend
    epic: EP-F03
    size: S
    sprint: 2
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given GET /api/v1/datasets/:id for ACTIVE dataset, When executed, Then full Dataset object returned"
      - "Given GET /api/v1/datasets/:id for DRAFT dataset, When requested by non-ADMIN, Then 404 returned"
      - "Given non-existent dataset id, When requested, Then 404 with code NOT_FOUND"
    test_plan:
      unit:
        - "DRAFT visibility gate applied correctly per role"
      integration:
        - "Returns all columns from Dataset table for given id"
      contract:
        - "Response matches Dataset schema in architecture.md"

  - id: ST-BE-F03-03
    title: "Dataset preview API — GET /datasets/:id/preview"
    stack: backend
    epic: EP-F04
    size: M
    sprint: 3
    requires_tests: true
    depends_on: [ST-BE-F03-02]
    acceptance_criteria:
      - "Given CSV dataset, When preview requested, Then first 50 rows returned as JSON array"
      - "Given spatial dataset (NetCDF/GeoTIFF), When preview requested, Then bounding box [minLon, minLat, maxLon, maxLat] returned"
      - "Given dataset with no preview data, When requested, Then { rows: null, bbox: null } returned"

  # ── Download Job Service ──────────────────────────────────────────────────────
  - id: ST-BE-F04-01
    title: "Download job creation — POST /datasets/:id/download"
    stack: backend
    epic: EP-F04
    size: M
    sprint: 3
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given entitled user POSTs /datasets/:id/download, When executed, Then DownloadJob created with status=PENDING and job_id returned"
      - "Given non-entitled user, When download requested, Then 403 with code ENTITLEMENT_REQUIRED"
      - "Given valid request, When job created, Then async processing begins (S3 presigned URL generation queued)"
    test_plan:
      unit:
        - "Entitlement check queries Entitlement table for org+dataset match"
      integration:
        - "POST creates DownloadJob row with PENDING status"
        - "Non-entitled org → 403"

  - id: ST-BE-F05-01
    title: "Download job polling + S3 presigned URL — GET /jobs/:id"
    stack: backend
    epic: EP-F05
    size: M
    sprint: 3
    requires_tests: true
    depends_on: [ST-BE-F04-01]
    acceptance_criteria:
      - "Given job is PROCESSING, When polled, Then { status: PROCESSING } returned"
      - "Given job is COMPLETE, When polled, Then { status: COMPLETE, download_url: <presigned_url>, url_expires_at } returned"
      - "Given presigned URL generated, When stored, Then url_expires_at = now + 24h"
      - "Given job belongs to different user, When polled, Then 403"
    test_plan:
      unit:
        - "Presigned URL has 24h expiry TTL"
        - "Owner check enforced before returning URL"
      integration:
        - "Job PENDING → PROCESSING → COMPLETE transitions stored in DB"
        - "Completed job returns presigned URL"

  # ── API Key Service ───────────────────────────────────────────────────────────
  - id: ST-BE-F06-01
    title: "API key CRUD + daily quota enforcement"
    stack: backend
    epic: EP-F06
    size: M
    sprint: 3
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given POST /api/v1/api-keys with name, When created, Then raw key returned once (not stored), bcrypt hash persisted"
      - "Given DELETE /api/v1/api-keys/:id, When called, Then revoked_at set to now; key no longer valid for auth"
      - "Given API call using a key, When calls_today >= quota_daily, Then 429 returned"
      - "Given midnight UTC, When quota reset job runs, Then calls_today = 0 for all keys"
    test_plan:
      unit:
        - "Raw key is bcrypt-hashed before DB write"
        - "calls_today incremented atomically on each API call"
        - "429 gate: calls_today >= quota_daily blocks request"
      integration:
        - "Create key → key appears in GET list"
        - "Revoke key → key excluded from list; auth fails with revoked key"

  # ── Usage API ─────────────────────────────────────────────────────────────────
  - id: ST-BE-F06-02
    title: "Usage API — GET /usage"
    stack: backend
    epic: EP-F06
    size: S
    sprint: 4
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given GET /api/v1/usage?window=7d, When executed, Then daily call counts for past 7 days returned"
      - "Given GET /api/v1/usage?window=30d, When executed, Then 30 days of data returned"
      - "Given caller's API key, When usage fetched, Then only that caller's data returned"

  # ── Org Service ───────────────────────────────────────────────────────────────
  - id: ST-BE-F10-01
    title: "Org member management — GET/POST/DELETE /org/members"
    stack: backend
    epic: EP-F10
    size: M
    sprint: 4
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given ORG_ADMIN POSTs /org/members with email+role, When executed, Then user invited (pending state) and email sent via Cognito"
      - "Given DELETE /org/members/:id, When executed by ORG_ADMIN, Then user removed from org"
      - "Given non-ORG_ADMIN role, When any org/members mutation attempted, Then 403"
    test_plan:
      unit:
        - "Role check: only ORG_ADMIN can write"
        - "Invite creates pending User row with org_id"
      integration:
        - "POST → new user in DB with SUBSCRIBER role + org_id"
        - "DELETE → user's org_id cleared"

  - id: ST-BE-F10-02
    title: "Org entitlements — GET /org/entitlements"
    stack: backend
    epic: EP-F10
    size: S
    sprint: 4
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given GET /org/entitlements, When executed, Then all Entitlement rows for caller's org returned with dataset details joined"
      - "Given entitlement expires_at in the past, When listed, Then marked as expired (not filtered out)"

  # ── Admin Service ─────────────────────────────────────────────────────────────
  - id: ST-BE-F09-01
    title: "Admin user management — GET/PATCH /admin/users"
    stack: backend
    epic: EP-F09
    size: M
    sprint: 5
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given ADMIN role, When GET /admin/users?q=email, Then paginated user list with search returned"
      - "Given PATCH /admin/users/:id { active: false }, When executed, Then user deactivated; Cognito account disabled"
      - "Given non-ADMIN role, When any /admin/* endpoint accessed, Then 403"

  - id: ST-BE-F09-02
    title: "Dataset moderation — PATCH /admin/datasets/:id"
    stack: backend
    epic: EP-F09
    size: M
    sprint: 5
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given PATCH /admin/datasets/:id { status: ACTIVE }, When executed, Then dataset visible in public catalog"
      - "Given PATCH /admin/datasets/:id { status: DEPRECATED, reason }, When executed, Then dataset hidden + reason logged to AuditLog"

  - id: ST-BE-F09-03
    title: "Audit log — GET /admin/audit"
    stack: backend
    epic: EP-F09
    size: M
    sprint: 5
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given GET /admin/audit?actor=email&action=download, When executed, Then filtered AuditLog rows returned paginated"
      - "Given any login/download/key-action/admin-op, When it occurs, Then AuditLog row written with actor_id, IP, timestamp"
    test_plan:
      unit:
        - "Audit write is non-blocking (fire-and-forget or queue)"
      integration:
        - "Login event → AuditLog row with action=LOGIN"
        - "Download → AuditLog row with action=DOWNLOAD + resource_id=dataset_id"

  # ── Subscription & Billing Service ───────────────────────────────────────────
  - id: ST-BE-F08-01
    title: "Subscription read/write — GET/POST /subscriptions + GET /invoices"
    stack: backend
    epic: EP-F08
    size: M
    sprint: 4
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given GET /subscriptions, When executed, Then caller's org current plan returned"
      - "Given POST /subscriptions { plan_id }, When executed, Then org plan updated and subscription_status=ACTIVE"
      - "Given GET /invoices, When executed, Then invoice history for caller's org returned"

# ═══════════════════════════════════════════════════════════════════════════════
# STACK: DATABASE  (repo: twa-backend · migrations/)
# All DB stories require migration rollback tests
# ═══════════════════════════════════════════════════════════════════════════════

database_stories:

  - id: ST-DB-001
    title: "Initial schema migration — all domain tables"
    stack: database
    size: M
    sprint: 1
    requires_tests: true
    depends_on: []
    tables:
      - User
      - Organisation
      - Plan
      - Dataset
      - Entitlement
      - DownloadJob
      - ApiKey
      - ApiUsageLog
      - AuditLog
    acceptance_criteria:
      - "Given migration runs on clean PostgreSQL, When applied, Then all tables created with correct column types, PKs, FKs, and NOT NULL constraints"
      - "Given migration is rolled back, When executed, Then all tables dropped cleanly with no orphaned constraints"
      - "Given migration runs twice, When applied, Then idempotent (no error on second apply)"
    test_plan:
      migration:
        - "Apply migration → all tables present"
        - "Rollback migration → tables absent"
        - "Insert + foreign key constraint test: User.org_id references Organisation.id"

  - id: ST-DB-002
    title: "GIN full-text index on dataset name + description + variable_tags"
    stack: database
    size: S
    sprint: 2
    requires_tests: true
    depends_on: [ST-DB-001]
    acceptance_criteria:
      - "Given migration applied, When EXPLAIN ANALYZE on full-text search query, Then GIN index is used (not seq scan)"
      - "Given 10k dataset rows, When catalog search runs, Then p99 < 100ms"
    test_plan:
      migration:
        - "GIN index present on datasets table after migration"
        - "Rollback removes index"

  - id: ST-DB-003
    title: "Seed data — plans, test org, test users"
    stack: database
    size: S
    sprint: 1
    requires_tests: true
    depends_on: [ST-DB-001]
    seed_data:
      plans: [FREE, PROFESSIONAL, ENTERPRISE]
      test_org:
        name: "Acme Weather Co."
        plan: PROFESSIONAL
      test_users:
        - { role: SUBSCRIBER, email: "subscriber@test.twa.io" }
        - { role: ORG_ADMIN, email: "admin@test.twa.io" }
        - { role: ADMIN, email: "superadmin@test.twa.io" }
        - { role: PUBLISHER, email: "publisher@test.twa.io" }
    acceptance_criteria:
      - "Given seed script runs on empty DB (after migration), When complete, Then 3 plans, 1 org, 4 users present"
      - "Given seed runs in test environment, When complete, Then test credentials usable for integration tests"

