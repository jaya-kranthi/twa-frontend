# ─── EPICS ───────────────────────────────────────────────────────────────────

epics:

  # ── F-01: Authentication & Session Management ───────────────────────────────
  - id: EP-F01
    title: "F-01 — Authentication & Session Management"
    route: /login
    persona: all
    sprint: 1

    stories:
      - id: ST-F01-01
        title: "Login page — email + password + MFA prompt"
        kind: frontend
        size: M
        sprint: 1
        depends_on: [SP-001]
        acceptance_criteria:
          - "Given unauthenticated user visits /login, When they enter valid credentials, Then Cognito JWT is stored in localStorage via auth.store.ts and they are redirected to /dashboard"
          - "Given invalid credentials, When form is submitted, Then error message is displayed without exposing token details"
          - "Given user with MFA enabled logs in, When password is accepted, Then MFA challenge screen appears"
        msw_handlers:
          - "POST /api/v1/auth/login → { access_token, refresh_token, mfa_required }"
        components:
          - LoginForm
          - MfaChallengeModal

      - id: ST-F01-02
        title: "MFA challenge screen — TOTP verification"
        kind: frontend
        size: M
        sprint: 1
        depends_on: [ST-F01-01]
        acceptance_criteria:
          - "Given MFA challenge is shown, When user enters valid TOTP code, Then session is established and user redirected to /dashboard"
          - "Given invalid TOTP code, When submitted, Then error is shown and form reset"
          - "Given 3 consecutive failures, When 4th attempt made, Then account lock message shown"
        msw_handlers:
          - "POST /api/v1/auth/mfa/verify → { access_token } | 401"
        components:
          - TotpInput

      - id: ST-F01-03
        title: "Forgot password + first-time password reset flow"
        kind: frontend
        size: M
        sprint: 1
        depends_on: [SP-001]
        acceptance_criteria:
          - "Given user clicks 'Forgot password', When they enter their email, Then confirmation message is shown"
          - "Given user follows reset link, When they enter new password meeting requirements, Then password is updated and redirected to /login"
        components:
          - ForgotPasswordForm
          - ResetPasswordForm

      - id: ST-F01-04
        title: "JWT session management — auto-refresh + idle timeout warning"
        kind: frontend
        size: M
        sprint: 1
        depends_on: [SP-001]
        acceptance_criteria:
          - "Given access token is 2 min from expiry, When any API call is made, Then refreshSession() is called transparently"
          - "Given user is idle for 13 min, When 14th minute starts, Then idle warning modal appears with 'Stay logged in' / 'Log out' options"
          - "Given user ignores warning for 1 min, When timeout fires, Then tokens are cleared and user redirected to /login"
        msw_handlers:
          - "POST /api/v1/auth/refresh → { access_token }"
        components:
          - IdleTimeoutModal

    test_tasks:
      - id: TK-test-F01-01
        title: "Tests: Login page"
        kind: frontend-test
        size: S
        sprint: 2
        depends_on: [ST-F01-01]
        test_plan:
          unit:
            - "LoginForm renders email + password fields and submit button"
            - "Validation shows errors for empty fields"
            - "Submit calls auth.store login action with credentials"
          integration:
            - "MSW returns 200 → redirects to /dashboard"
            - "MSW returns 401 → error message displayed"
            - "MSW returns mfa_required → MFA modal shown"
          a11y:
            - "No axe violations on login page"

      - id: TK-test-F01-02
        title: "Tests: MFA challenge"
        kind: frontend-test
        size: S
        sprint: 2
        depends_on: [ST-F01-02]
        test_plan:
          unit:
            - "TotpInput accepts 6-digit code"
            - "Submit disabled until 6 digits entered"
          integration:
            - "MSW 200 → session stored, redirect"
            - "MSW 401 → error shown, form reset"
          a11y:
            - "TOTP input has aria-label"

      - id: TK-test-F01-03
        title: "Tests: Forgot password + reset"
        kind: frontend-test
        size: S
        sprint: 2
        depends_on: [ST-F01-03]
        test_plan:
          unit:
            - "ForgotPasswordForm validates email format"
            - "ResetPasswordForm validates password strength and match"
          integration:
            - "Submission shows confirmation message"
          a11y:
            - "No axe violations on both forms"

      - id: TK-test-F01-04
        title: "Tests: JWT session management"
        kind: frontend-test
        size: S
        sprint: 2
        depends_on: [ST-F01-04]
        test_plan:
          unit:
            - "refreshSession called when token < 2 min from expiry"
            - "Idle timer resets on user interaction"
            - "IdleTimeoutModal shows at 14 min idle"
          integration:
            - "MSW refresh 200 → new token stored"
            - "MSW refresh 401 → logout + redirect"
          a11y:
            - "IdleTimeoutModal is focusable and keyboard navigable"

    e2e:
      - id: ST-e2e-F01
        title: "E2E: Auth — login, MFA, logout, session refresh"
        kind: e2e-test
        size: M
        sprint: 3
        depends_on: [ST-F01-01, ST-F01-02, ST-F01-03, ST-F01-04]
        test_plan:
          scenarios:
            - "Happy path: login with valid credentials → lands on /dashboard"
            - "Happy path with MFA: enter TOTP → lands on /dashboard"
            - "Forgot password → reset link → reset → login with new password"
            - "Edge case: idle 15 min → auto-logout → redirect /login"
            - "Mobile (375px): login form is usable without horizontal scroll"

